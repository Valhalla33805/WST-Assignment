<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WST Assignment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="agonzales_style.css">
</head>
<body>

    <div class="card">
        <h1>Interactive Background</h1>
        <button onclick="changeColor()">Click Me!</button>

        <table>
            <tr><td class="label">Color</td><td id="colorDisplay">Neutral</td></tr>
            <tr><td class="label">Interactions</td><td id="clickCount">0</td></tr>
        </table>
    </div>

    <script>
       let count = 0;
        function changeColor() {
            // Expanded color palette
            const colors = {
                "#2c3e50": "Midnight", "#34495e": "Slate", "#7f8c8d": "Steel",
                "#8e44ad": "Deep Plum", "#2980b9": "Ocean", "#16a085": "Emerald",
                "#27ae60": "Nephritis", "#f39c12": "Orange", "#d35400": "Pumpkin",
                "#c0392b": "Pomegranate", "#bdc3c7": "Silver", "#9b59b6": "Amethyst",
                "#1abc9c": "Turquoise", "#e67e22": "Carrot", "#3498db": "Peter River",
                "#e74c3c": "Alizarin", "#f1c40f": "Sun Flower", "#ecf0f1": "Clouds"
            };

            let keys = Object.keys(colors);
            let randomHex = keys[Math.floor(Math.random() * keys.length)];
            
            // Apply visual changes
            document.body.style.backgroundColor = randomHex;
            document.querySelector('.card').style.backgroundColor = randomHex + "44";
            
            // Trigger zoom animation
            document.body.classList.remove('animate-zoom');
            void document.body.offsetWidth; 
            document.body.classList.add('animate-zoom');
            
            // Update table
            document.getElementById("colorDisplay").innerText = colors[randomHex];
            document.getElementById("clickCount").innerText = ++count;
        }
    </script>
</body>
</html>
